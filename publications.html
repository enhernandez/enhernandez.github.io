<script>
const PUBS = [
  {y:2026,t:"article",ven:"Comparative Political Studies",
   title:"Winners' Restraint or Affective Majoritarianism? Elections, Polarization and Political Support",
   au:"D. Tomic, S. Ferrer, E. Hernández, E. Prada", doi:"10.1177/00104140251414013",
   ab:"The literature analyzing the impact of winning and losing elections on individuals' political support has predominantly focused on the gap in satisfaction with democracy. We analyze if these winner-loser dynamics extend to citizens' support for principles related to norms of democratic restraint and consent, and how partisan animus might reinforce these dynamics. Based on CSES data for 24 elections, we find that winners and losers do not differ in their support for unrestrained majority rule vis-a-vis the protection of the rights of minorities, or in their likelihood of favoring a strong leader willing to bypass legal constraints — even among highly affectively polarized individuals."},
  {y:2025,t:"article",ven:"European Journal of Political Research, 64(4), 2018-2038",
   title:"The Value of Liberal Democracy: Assessing Citizens' Commitment to Democratic Principles",
   au:"S. Ferrer, E. Hernández, E. Prada, D. Tomic",
   url:"https://onlinelibrary.wiley.com/doi/full/10.1111/1475-6765.70021",
   ab:"Recent studies suggest that citizens are unlikely to trade off free elections for other desirable outcomes. However, today democracy is not often undermined by abolishing elections — but by undermining other liberal-democratic principles. Through a seven country conjoint experiment, we find that while citizens do not relinquish free elections easily, they are more open to forgo liberal principles undermined in backsliding processes, especially when these principles are eroded gradually, one at a time."},
  {y:2025,t:"article",ven:"Electoral Studies, 95, 102962",
   title:"Rural Representation in Europe: The Presence of Place in National Parliaments",
   au:"G. Rico, R. García del Horno, E. Hernández", doi:"10.1016/j.electstud.2025.102962",
   ab:"Recent research shows a growing rural-urban divide in political attitudes and behavior. This paper provides a systematic assessment of biases in place-related descriptive representation in 28 European countries. Using data on legislator biographies and geographic and demographic statistics, we examine the relative presence of legislators with urban and rural backgrounds in national parliaments, and assess the extent to which parliamentary composition, in terms of members' birthplaces, reflects the broader demographic makeup of country populations. Our results show that rural areas tend to be underrepresented in national parliaments when compared to urban ones. Differences in the descriptive representation of rural areas vary in consistent ways with urbanization levels, electoral system features, parties' characteristic constituencies, territorial embeddedness and ideological orientation, and legislator sociodemographics."},
  {y:2025,t:"article",ven:"Electoral Studies, 95, 102912",
   title:"Measuring Rural and Urban Consciousness in Europe",
   au:"C. Claassen et al. (incl. E. Hernández)", doi:"10.1016/j.electstud.2025.102912",
   ab:"A rural consciousness, encompassing a rural identity and resentments directed at urban areas and the political elite, has emerged as a key explanation for the growing rural-urban political divides affecting many Western democracies. However, this nascent concept faces important measurement and methodological challenges. While some researchers include identity as a component of consciousness, others omit it. Disagreements also exist regarding the structure of resentment itself, i.e., whether it is characterized by three distinct components corresponding to cultural, power, and resource resentments, or whether these essentially cohere into a single dimension. Further, while rural consciousness has gained much scholarly attention, its conceptual mirror image, an urban consciousness, has been largely neglected. We address these issues by fielding a set of five resentment items in nine national samples drawn from Western and Eastern Europe. We find that both rural and urban consciousness are best understood as comprising a dimension of identity and three dimensions of resentment pertaining to power, resources, and culture. We further find that rural consciousness in Western Europe is generally associated with indicators of \"left behind\" status such as low income and lack of a university education and is also associated with identification with the political right. Finally, we show that ruralites display higher trust in local (rather than national) institutions to the extent that they are resentful."},
  {y:2025,t:"article",ven:"European Political Science Review, 17(1), 61-79",
   title:"Too Crooked to be Good? Trade-offs in the Electoral Punishment of Malfeasance and Corruption",
   au:"S. Breitenstein, E. Hernández",
   url:"https://www.cambridge.org/core/journals/european-political-science-review/article/too-crooked-to-be-good-tradeoffs-in-the-electoral-punishment-of-malfeasance-and-corruption/240FDDE3ABE1A271F0B8353FC68E0EDE",
   ab:"While elections are an instrument to hold politicians accountable, corrupt politicians are often re-elected. Citizens may trade off integrity for competence: voters may forgive corruption if corrupt politicians manage to deliver desirable outcomes. Using a survey experiment, we find that citizens prefer a politician who follows the law, even if this leads to a sub-optimal outcome — but voters are more likely to overlook violations of the law that benefit the community if these do not result in a personal gain for politicians."},
  {y:2025,t:"article",ven:"Scientific Data, 12",
   title:"The Spanish Political Attitudes Panel (12 waves)",
   au:"R. Pannico, C. Galais, E. Hernández, G. Rico, E. Anduiza", doi:"10.1038/s41597-025-05684-4",
   ab:"The online POLAT Panel (Spanish Political Attitudes Dataset) tracks changes in the political attitudes and behaviors of 4,633 Spanish individuals over a 10-year period. Unlike most panel surveys that primarily emphasize socio-economic characteristics, the POLAT Panel focuses mainly on political variables. Conducted across 12 waves from 2010 to 2020, the dataset provides valuable longitudinal insights into how citizens' political views change over time. It allows researchers to analyze shifts in public opinion in the context of significant events such as the financial crisis and the associated wave of protests, the rise of populism and the appearance of new political parties, or the COVID-19 pandemic."},
  {y:2025,t:"article",ven:"Public Management Review, 27(1), 183-217",
   title:"\"It's a match!\": A discrete choice experiment on job attractiveness for public service jobs",
   au:"G. Ripoll, X. Ballart, E. Hernández, W. Vandenabeele", doi:"10.1080/14719037.2023.2239256",
   ab:"What makes public service jobs attractive to citizens? In this paper, we contribute to the literature by studying several attributes simultaneously, by categorising the signals sent by each attribute as instrumental or symbolic, and by clarifying the role of PSM. Using a conjoint experiment on a sample of citizens in Catalonia (Spain), the results show that citizens prefer stable, well-paid and public sector jobs in organizations pursuing public values. The influence of public values, a symbolic attribute, strengthens as PSM increases, but citizens with high PSM are equally responsive to the appeal of other attributes."},
  {y:2025,t:"article",ven:"Acta Politica, 60, 663-681",
   title:"What is political and what is not? Illustrating how the public salience of abortion in the media shapes public perceptions about its political nature",
   au:"M. Fraile, E. Hernández", doi:"10.1057/s41269-024-00347-5",
   ab:"We theorize and analyze how the prominence of abortion in the media affects whether or not citizens consider abortion a political issue. To do so, we leverage an unexpected surge in media attention to abortion regulation in Spanish media during the fieldwork of our survey to implement an Unexpected Event During Survey Design. Our findings reveal that respondents interviewed after abortion gained salience in the media were 10 percentage points more likely to perceive abortion as a political matter."},
  {y:2024,t:"article",ven:"West European Politics, 47(7), 1447-1472",
   title:"Do They Feel Like They Don't Matter? The Rural-Urban Divide in External Political Efficacy",
   au:"R. García del Horno, G. Rico, E. Hernández", doi:"10.1080/01402382.2023.2261085",
   ab:"This article studies the rural-urban divide in external political efficacy, which reflects individuals' beliefs about the responsiveness of political elites, while also examining if compositional and contextual factors can explain such a divide. Drawing on data from the European Social Survey, the results reveal a significant rural-urban gap in external efficacy, which is partly explained by differences in the sociodemographic characteristics of rural and urban dwellers, but not by disparities in their evaluation of the provision of basic public services. Additionally, this rural-urban gap in external efficacy is substantively smaller in those countries with higher levels of electoral malapportionment that lead to an overrepresentation of rural areas in national parliaments."},
  {y:2024,t:"article",ven:"Revista Española de Ciencia Política, 65, 73-88",
   title:"The POLAT Panel: Spanish Political Attitudes Survey",
   au:"D. Tomic, C. Galais, E. Hernández et al.",
   url:"https://recyt.fecyt.es/index.php/recp/article/view/102565",
   ab:"The Spanish Political Attitudes Panel Dataset (POLAT) is an ongoing panel study carried out in Spain. The present research note introduces the dataset and presents some results of the first six waves, fielded in a political context defined by a prolonged economic recession, major corruption scandals and widespread mass protests (2010-2014). The POLAT Panel has more than 370 questions and captures political attitudes, behaviors and public opinion on the main issues of the day. The longitudinal aspect of the dataset allows researchers to trace changes and exploit within-individual variation in a wide array of political, social and economic attitudes and behaviors. The note also offers validity checks for some of the key empirical indicators against the benchmark of concurrent surveys, including the European Social Survey."},
  {y:2024,t:"article",ven:"International Public Management Journal, 27(2), 284-301",
   title:"Enhancing satisfaction with public services: The effect of recalling personal experiences",
   au:"X. Ballart, E. Hernández, M. Esteve", doi:"10.1080/10967494.2024.2317835",
   ab:"This article contributes to the study of the determinants of satisfaction with public services and the application of the expectation-disconfirmation model to public services, which is relevant for a better understanding of the mental processes that determine public service satisfaction and the role that personal experiences play in this. The study is based on a survey experiment on public healthcare provision in Catalonia, where citizens were primed to describe positive and negative experiences. The results show that when there is high personal involvement in the form of an affective reaction there is a positive effect on satisfaction. This effect is stronger among those individuals who demand more from public organizations, give lower ratings to public services, and are less willing to change their judgements considering the particular social and economic context."},
  {y:2023,t:"article",ven:"Research & Politics, 10(3)",
   title:"The (Null) Effects of the Russian Invasion of Ukraine on Europeans' Attitudes Toward Democracy",
   au:"E. Hernández, M. Ares",
   url:"https://journals.sagepub.com/doi/10.1177/20531680231204679",
   ab:"We analyze the short-term impact of the Russian invasion of Ukraine on Europeans' attitudes toward democracy, leveraging the coincidence of the invasion with the European Social Survey fieldwork in 10 countries. The invasion did not have any substantive impact across 12 democratic attitudes — Europeans' support for democracy was resilient in the short run, but this threat did not lead to a 'rally-round-democracy' either."},
  {y:2023,t:"article",ven:"Public Performance & Management Review, 46(1), 225-256",
   title:"Are highly public service motivated individuals immune to common causes of unethical behaviour?",
   au:"G. Ripoll, E. Hernández, X. Ballart", doi:"10.1080/15309576.2022.2127806",
   ab:"Studies confirming the negative effect of public service motivation (PSM) on unethical behavior have neglected the moderating role of the environment. This article investigates whether this effect prevails under group pressure and competition for economic resources. Through a survey experiment on a sample of citizens in Catalonia (Spain), the results suggest that PSM is vulnerable to group pressure and that the proposed activation of public values does little to neutralize this effect."},
  {y:2022,t:"article",ven:"West European Politics, 45(5), 1130-1152",
   title:"The Long-Lasting Effects of Citizenship Education Subjects",
   au:"E. Hernández, C. Galais", doi:"10.1080/01402382.2021.1917153",
   ab:"This article exploits discontinuities generated by changes in Spanish education policies to identify the long-term effects of civic education on multiple outputs usually set as the policy goals of these courses: political engagement, institutional support and political values. In 2007 a new standalone citizenship education subject was introduced in the Spanish school curricula. This subject was then progressively removed from the curricula until its disappearance in 2017. These changes gave rise to exogenous variation in exposure to civic education between young individuals born in different years. The article exploits these policy changes to identify the effects of citizenship education through a regression discontinuity design that draws on a 12-wave panel survey. The results point to the emergence of a generation of critical—yet passive—citizens as a result of the implementation of a standalone citizenship education subject in Spanish schools."},
  {y:2021,t:"article",ven:"Political Research Exchange, 3(1), 1-15",
   title:"The Crown: A Survey About the Spanish Monarchy",
   au:"E. Hernández, M. Torre, A. De Moragas", doi:"10.1080/2474736X.2021.1938149",
   ab:"The distinction between constitutional monarchies and republics constitutes a striking divide in how modern democracies are institutionalized. However, the lack of data about citizens' preferences for a monarchic or republican model of democracy has hindered the analysis of public opinion about this topic. This research note introduces a comprehensive survey that gauges citizens' attitudes towards the monarchy in Spain. The survey was fielded in late 2020 and provides unique information such as respondents' preferences about different models of democracy, how they define an ideal monarch, and their evaluations of whether current and former Spanish kings live up to these ideals. Taken together with the extensive socio-demographic and political background variables included in the dataset, this survey will be an excellent resource for researchers aiming to systematically analyze the foundations of citizens' attitudes towards the monarchy and Spain's political culture."},
  {y:2021,t:"article",ven:"European Political Science Review, 13(2), 209-225",
   title:"Preferences for Consensus and Majoritarian Democracy: Long- and Short-Term Influences",
   au:"M. Ferrín, E. Hernández", doi:"10.1017/S1755773921000047",
   ab:"This article analyzes individuals' preferences for a consensus or a majoritarian type of democracy. We theorize that variation in these preferences is a function of both institutional learning (long term) and individuals' position as a political minority or majority (short term). As a result of institutional learning, we expect that those who live in democracies characterized by coalition governments will favor consensus democracy, while those who live in countries characterized by single-party executives will favor majoritarian democracy. We also expect that those who are part of the political minority, as measured by the fact that they support smaller parties, will be more supportive of consensus democracy, while those who vote for large parties will tend to think that majoritarian systems are best for democracy. We argue that whether institutional learning or individuals' position as a political minority or majority prevail in influencing these preferences about the ideal model of democracy will be a function of the democratic trajectory of each country. We test these arguments drawing on data from the sixth (2012) round of the European Social Survey (ESS), which included a rotating module on citizen's views and evaluations of democracy."},
  {y:2021,t:"article",ven:"Electoral Studies, 69(1), 1-9",
   title:"Affective polarization and the salience of elections",
   au:"E. Hernández, E. Anduiza, G. Rico", doi:"10.1016/j.electstud.2020.102203",
   ab:"This article analyzes the effects of election salience on affective polarization. Campaigns and elections epitomize the moment of maximum political conflict, information spread, mobilization, and activation of political identities and predispositions. We expect that affective polarization will be higher just after an election has taken place, and that as elections lose salience affective polarization will diminish. We analyze this question using CSES data from 99 post-electoral surveys conducted in 42 countries between 1996 and 2016, exploiting variation in the timing of survey interviews with respect to the election day as an exogenous measure of election salience. The empirical findings indicate that as elections lose salience affective polarization declines. We further contribute to the debate on the origins of affective polarization by exploring two mechanisms that may account for this relationship: changes in ideological polarization and in the intensity of party identification. Both are relevant mediators, with ideological polarization seemingly playing a more important role."},
  {y:2020,t:"article",ven:"Political Analysis, 28(2), 186-206",
   title:"Unexpected Event during Survey Design: Promise and Pitfalls for Causal Inference",
   au:"J. Muñoz, A. Falcó-Gimeno, E. Hernández", doi:"10.1017/pan.2019.27",
   ab:"In this paper we discuss the use of an identification strategy based on unforeseen and salient events that split the sample of respondents of a survey into treatment and control groups: the Unexpected Event during Survey Design (UESD). We focus on the assumptions under which unexpected events can be exploited to estimate causal effects and we discuss potential threats to identification, paying especial attention to the observable and testable implications of these assumptions. We propose a series of best practices in the form of various estimation strategies and robustness checks that can be used to lend credibility to the causal estimates. Drawing on data from the European Social Survey, we illustrate the method with an original study of the impact of the Charlie Hebdo terrorist attacks (Paris, 01/07/2015) on French citizens' satisfaction with their national government."},
  {y:2020,t:"article",ven:"European Union Politics, 21(4), 569-589",
   title:"The impact of EU institutional advertising on public support for European integration",
   au:"E. Hernández, R. Pannico", doi:"10.1177/1465116520935198",
   ab:"Drawing on utilitarian theories that propose that support for the EU is based on an instrumental calculus about the costs and benefits of European integration, in this article we analyze whether and how ads produced by European institutions affect public support for the EU. The European Parliament has produced videos to inform citizens about the benefits of European integration. We showed two of these videos to citizens in Spain. We find that participants who watched the videos were more likely to express increased support for European integration and Spain's EU membership. Ads emphasizing the policy benefits of European integration were more effective than ads emphasizing its reduced economic costs. However, the effects of EU institutional advertising did not persist over time."},
  {y:2019,t:"article",ven:"European Political Science Review, 11(4), 485-502",
   title:"Democracy belief systems in Europe: Cognitive availability and attitudinal constraint",
   au:"E. Hernández", doi:"10.1017/S1755773919000286",
   ab:"This paper contributes to the literature on citizens' views and evaluations of democracy by analyzing the extent to which ordinary citizens are capable of developing structured opinions about democracy and its constitutive principles. To do so, the paper adapts Converse's notion of political belief systems to analyze the articulation of individuals' democracy belief systems (DBS). With this aim the paper conceptualizes and operationalizes the main components of individuals' DBS: cognitive availability, horizontal constraint, and vertical constraint. Drawing on data from the sixth round of the European Social Survey, the paper describes the articulation of DBS in Europe. The results indicate that, on average, Europeans have a relatively articulated DBS, although the empirical analyses reveal some individual- and country-level variation in the articulation of specific components of DBS."},
  {y:2018,t:"article",ven:"European Union Politics, 19(3), 458-480",
   title:"Democratic discontent and support for mainstream and challenger parties: Democratic protest voting",
   au:"E. Hernández", doi:"10.1177/1465116518770812",
   ab:"This article develops the democratic protest voting model, a theoretical framework to analyze how different forms of democratic discontent relate to the chance of defecting from mainstream parties and supporting left- and right-wing challenger parties. The empirical results reveal that voters tend to support parties that are aligned with the specific nature of their democratic discontent. These results imply that voting for challenger parties should not be conceptualized as a mere expression of protest decoupled from political preferences, but as a process of democratic protest voting that is informed by normative democratic preferences."},
  {y:2018,t:"article",ven:"Comparative European Politics, 16(3), 351-384",
   title:"Evaluations of the quality of the representative channel and unequal participation",
   au:"E. Hernández, M. Ares", doi:"10.1057/cep.2015.45",
   ab:"This article analyzes how individual-level assessments of the quality and functioning of the representative channel affect citizens' likelihood to turn out to vote and to engage in alternative forms of non-institutionalized participation, and whether these relationships are moderated by individual resources as measured by education. Relying on novel data from the sixth round of the European Social Survey on how European citizens evaluate different aspects of democracy, we show that negative evaluations of the quality of the representative channel discourage voting, but only promote participation in demonstrations among the highly educated. These findings highlight potential inequalities in citizens' ability to voice their political demands: while highly educated individuals are likely to translate their negative evaluations of the institutional channel of representation into non-institutionalized forms of participation, low educated individuals are not."},
  {y:2017,t:"article",ven:"Research & Politics, 4(2)",
   title:"The corrosive effect of corruption on trust in politicians: Evidence from a natural experiment",
   au:"M. Ares, E. Hernández", doi:"10.1177/2053168017714185",
   ab:"Do real-world corruption scandals have a negative causal effect on trust in politicians? Does the impact of scandals decay over time? Do corruption scandals have a weaker impact among the supporters of the party involved in the scandal? We address these questions through a natural experiment generated by the coincidence of the uncovering of a corruption scandal in Spain (the Bárcenas scandal) and the fieldwork of the European Social Survey. Given that the day at which survey interviews were conducted is as-if random, the uncovering of the scandal represents a unique opportunity to assess the causal effect of corruption on individuals' trust in politicians. The results indicate that: (i) the corruption scandal had a substantial negative effect on trust in politicians; (ii) the effect of the scandal was stronger in the days following its disclosure; (iii) the effect of the scandal was independent from individuals' partisan preferences."},
  {y:2016,t:"article",ven:"Electoral Studies, 44, 515-524",
   title:"Turning your back on the EU. The role of Eurosceptic parties in the 2014 European Parliament elections",
   au:"E. Hernández, H. Kriesi", doi:"10.1016/j.electstud.2016.04.013",
   ab:"This article analyses how disaffection with the EU influenced individuals' likelihood of turning out to vote and of casting a vote for a Eurosceptic party in the 2014 EP elections, and how these relationships were moderated by the Eurosceptic partisan supply of each country. We argue that the degree to which political parties oppose European integration, as well as the ideological leaning of Eurosceptic parties, should influence both the likelihood of disaffected citizens turning out to vote, and their likelihood of voting for a Eurosceptic party. Our empirical findings show that, in the presence of a party that is strongly opposed to European integration, disaffected citizens are more likely to turn out to vote and to vote for a Eurosceptic party provided that this party also shares their ideological leaning in the left-right dimension. These results indicate that Eurosceptic parties are important actors for the politicization of the European integration conflict and for the Europeanization of EP elections, but they also suggest that opposition to European integration is subordinate to the traditional left-right conflict."},
  {y:2016,t:"article",ven:"European Journal of Political Research, 55(2), 203-224",
   title:"The Electoral Consequences of the Financial and Economic Crisis in Europe",
   au:"E. Hernández, H. Kriesi",
   url:"https://ejpr.onlinelibrary.wiley.com/doi/abs/10.1111/1475-6765.12122",
   ab:"We analyze the electoral consequences of the Great Recession by combining economic voting theories with the literature on party system change. Drawing on data from 30 European democracies, economic strain was associated with sizable losses for incumbent parties and the destabilisation of Western European party systems. Populist radical-right, radical-left and non-mainstream parties benefited the most."},
  {y:2025,t:"chapter",ven:"In: Ferrín & Kriesi (Eds.), How Europeans View and Evaluate Democracy Revisited: Ten Years Later. Oxford University Press",
   title:"Stability and change in Europeans' views of democracy",
   au:"E. Hernández",
   url:"https://academic.oup.com/book/59840/chapter-abstract/511341654",
   ab:"Using data from the European Social Survey (ESS), this chapter examines the stability and change in Europeans' views of democracy between 2012 and 2021. The results show continued high support for core democratic elements such as free elections and the rule of law. However, there is some decline in the importance attributed to social democratic elements and direct democracy. Europeans remain committed to democracy."},
  {y:2025,t:"chapter",ven:"In: Ferrín & Kriesi (Eds.), How Europeans View and Evaluate Democracy Revisited: Ten Years Later. Oxford University Press",
   title:"Democratic views and voting behavior",
   au:"M. Ferrín, E. Hernández, P. Riera",
   url:"https://academic.oup.com/book/59840/chapter-abstract/511346260",
   ab:"Since 2012, the European political landscape has transformed with the rise of non-mainstream parties, particularly radical right parties, which gained significant ground in national elections and the European Parliament. This shift may impact Europeans' views on democracy, as these parties promote alternative democratic models beyond the traditional liberal framework. The chapter explores the relationship between democratic views and voting behavior, analyzing data from ESS rounds 6 and 10."},
  {y:2025,t:"chapter",ven:"In: Torcal & Harteveld (Eds.), Handbook of Affective Polarization. Edward Elgar",
   title:"Party competition and affective polarization",
   au:"E. Anduiza, D. Balinhas, E. Hernández",
   url:"https://ddd.uab.cat/pub/caplli/2025/327070/hanaffpol_a2025c18p270.pdf",
   ab:"This chapter examines the relationship between affective polarization and party competition, focusing on both dynamic and structural elements. Party competition has a dynamic nature, with moments of heightened confrontation during campaigns, when affective polarization increases, and moments of power sharing and inter-party cooperation, when affective polarization decreases. The climate of elite interactions matters for citizens' levels of affective polarization. While it is reasonable to expect that coalition formation goes hand in hand with depolarization between supporters of coalition partners, it is more surprising that the positive effects of the formation of coalitions spill over to other parties and seem to persist over time. Party competition and cooperation are in turn conditioned by institutional arrangements and particularly by the electoral system, which affects party system characteristics and affective polarization."},
  {y:2020,t:"chapter",ven:"In: Muro & Lago (Eds.), Oxford Handbook of Spanish Politics. Oxford University Press",
   title:"Determinants of Voting Behaviour", au:"M. Fraile, E. Hernández",
   url:"https://academic.oup.com/edited-volume/28335/chapter-abstract/215117116",
   ab:"This chapter provides an overview of the main correlates of voting behaviour in Spain. The authors offer a comprehensive and up-to-date account of the importance of these correlates of voting behaviour by drawing on four available pre- and post-electoral panel studies from the Spanish Centro de Investigaciones Sociológicas (CIS) and analyzing the association of these features with individuals' voting choices in the 2000, 2008, 2011, and 2015 general elections. The findings illustrate the relevance and evolution of key factors related to the sociological, the social-psychological, and the performance-based models of voting behaviour in Spain."},
  {y:2019,t:"chapter",ven:"In: Tumber & Waisbord (Eds.), The Routledge Companion to Media and Scandal. Routledge",
   title:"The Political Consequences of Corruption Scandals: Main Findings and Challenges",
   au:"M. Ares, S. Breitenstein, E. Hernández", doi:"10.4324/9781351173001-46",
   ab:"A burgeoning literature about the political consequences of corruption scandals has developed over the last two decades thanks to greater data availability, methodological innovations, and growing concerns about the deleterious effects of corruption. This chapter reviews this literature and discusses the main reasons why citizens may not punish politicians involved in corruption scandals: (i) because they don't know—e.g. they do not receive information about corruption; (ii) because they don't want to—e.g. because punishing corrupt politicians conflicts with previously held attitudes like partisanship; and (iii) because they can't—e.g. there are no non-corrupt alternatives to vote for. The chapter concludes by outlining the main challenges facing the field."},
  {y:2019,t:"chapter",ven:"In: De Sio, Franklin & Russo (Eds.), The European Parliament Elections of 2019. Luiss University Press",
   title:"Spain: The endless election sequence", au:"M. Fraile, E. Hernández",
   url:"https://cise.luiss.it/cise/2019/07/24/the-european-parliament-elections-of-2019-individual-chapters-in-pdf/",
   ab:"This chapter analyzes the eighth Spanish European Parliament Election (EPE), which marked the end of an electoral cycle that began one month before (on April 26th, 2019) with the General Election in which the incumbent Socialist Party (PSOE) won a plurality of seats. For the first time since the first Spanish European Parliament election in 1987, the EPE was held on the same date as regional elections (in twelve out of seventeen regions). At the time of the EPE, a parliamentary agreement to elect a new national government had not been reached, since most parties were eager to postpone this decision until after the election."},
  {y:2019,t:"chapter",ven:"In: Gómez, Cabeza & Alonso (Eds.), En busca del poder territorial. CIS",

   url:"https://libreria.cis.es/libros/en-busca-del-poder-territorial/9788474767933/"},
  {y:2016,t:"chapter",ven:"In: Ferrín & Kriesi (Eds.), How Europeans View and Evaluate Democracy. Oxford University Press",
   title:"Europeans' Views of Democracy: the Core Elements of Democracy",
   au:"E. Hernández", doi:"10.1093/acprof:oso/9780198766902.003.0003",
   ab:"The sixth Round of the European Social Survey provides the opportunity to systematically describe and compare Europeans' conceptions or views of democracy using an extensive number of indicators. Based on these indicators, this chapter addresses the questions of which are the aspects of democracy that Europeans consider most and least important for an ideal democracy, and to what extent there is a consensus across Europe with regard to the importance of these features. This chapter also seeks to assess the extent to which Europeans are democratically aware, by analyzing their capacity to respond to questions related to their views of democracy."},
  {y:2024,t:"dataset",ven:"CORA Repositori de Dades de Recerca",

function render(filter){
  const wrap = document.getElementById('pubs');
  wrap.innerHTML = '';
  const list = PUBS.filter(p => filter==='all' || p.t===filter).sort((a,b)=> b.y - a.y);
  let lastY = null;
  list.forEach((p,i)=>{
    if (p.y !== lastY){
      const yh = document.createElement('div');
      yh.className = 'year'; yh.textContent = p.y;
      wrap.appendChild(yh); lastY = p.y;
    }
    const linkHtml = p.url ? `<a href="${p.url}" target="_blank">link ↗</a>` :
                     (p.doi ? `<a href="https://doi.org/${p.doi}" target="_blank">doi ↗</a>` : '');
    const absBtn = p.ab ? `<button data-i="${i}">abstract</button>` : '';
    const absDiv = p.ab ? `<div class="pub-abs" data-x="${i}">${p.ab}</div>` : '';
    const div = document.createElement('div'); div.className = 'pub';
    div.innerHTML = `
      <div class="pub-title">${p.title}</div>
      <div class="pub-authors">${p.au}</div>
      <div class="pub-venue">${p.ven}</div>
      <div class="pub-actions">
        ${absBtn}
        ${linkHtml}
      </div>
      ${absDiv}`;
    wrap.appendChild(div);
  });
  wrap.querySelectorAll('button[data-i]').forEach(b=>{
    b.addEventListener('click',()=>{
      const id = b.getAttribute('data-i');
      const ex = wrap.querySelector(`[data-x="${id}"]`);
      const open = ex.classList.toggle('open');
      b.textContent = open ? 'hide abstract' : 'abstract';
    });
  });
}
document.querySelectorAll('#filters button').forEach(f=>{
  f.addEventListener('click',()=>{
    document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('active'));
    f.classList.add('active'); render(f.dataset.f);
  });
});
render('all');
</script>
